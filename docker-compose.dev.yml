services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: freeframe
      POSTGRES_PASSWORD: freeframe
      POSTGRES_DB: freeframe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeframe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      # S3 auto-detects AWS vs MinIO based on access key in .env
      # If .env has AKIA* key -> uses AWS S3
      # Otherwise -> uses S3_ENDPOINT (MinIO)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: >
      sh -c "cd /workspace/apps/api && alembic upgrade head && cd /workspace && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      # S3 auto-detects AWS vs MinIO based on access key in .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: celery -A apps.api.tasks.celery_app worker -Q transcoding -c 2 --loglevel=info

volumes:
  pgdata:
  miniodata:
  redisdata:
