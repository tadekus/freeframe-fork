services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: freeframe
      POSTGRES_PASSWORD: freeframe
      POSTGRES_DB: freeframe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeframe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_CORS_ALLOW_ORIGIN: http://localhost:3000
      MINIO_CORS_ALLOW_METHODS: GET,PUT,POST,DELETE,HEAD
      MINIO_CORS_ALLOW_HEADERS: "*"
      MINIO_CORS_EXPOSE_HEADERS: ETag,Content-Length,x-amz-request-id
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/freeframe;
      mc anonymous set download local/freeframe;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      # Override S3 to use local MinIO for dev (avoids CORS issues with AWS)
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: freeframe
      S3_REGION: us-east-1
      S3_PUBLIC_ENDPOINT: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: >
      sh -c "cd /workspace/apps/api && alembic upgrade head && cd /workspace && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      # Override S3 to use local MinIO for dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: freeframe
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: celery -A apps.api.tasks.celery_app worker -Q transcoding -c ${TRANSCODING_CONCURRENCY:-2} --loglevel=info

  email_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: freeframe
      S3_REGION: us-east-1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: celery -A apps.api.tasks.celery_app worker -Q email_high,email_low -c ${EMAIL_CONCURRENCY:-2} --loglevel=info

  web:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_SECRET: dev-secret
      NEXTAUTH_URL: http://localhost:3000
    volumes:
      - /Users/ravirajsinh45/Work/Techiebutler/freeframe/.worktrees/feature/frontend/apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  redisdata:
  web_node_modules:
